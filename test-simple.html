<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPostureFitness - Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🏃‍♂️ ProPostureFitness - Application Test</h1>
    
    <div id="status" class="status info">
        Testing application components...
    </div>
    
    <button onclick="skipAuth()">Skip Authentication & Continue</button>
    <button onclick="testOfflineMode()">Test Offline Mode</button>
    <button onclick="loadMainApp()">Load Main Application</button>
    
    <div id="results"></div>

    <script type="module">
        import APIService from './js/apiService.js';
        import ExerciseRecommendationManager from './js/exerciseRecommendationManager.js';
        
        window.skipAuth = function() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status success';
            statusEl.innerHTML = '✅ Authentication skipped - running in demo mode';
            
            // Simulate being logged in
            localStorage.setItem('demo_mode', 'true');
            
            setTimeout(() => {
                loadMainApp();
            }, 1000);
        };
        
        window.testOfflineMode = function() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status info';
            statusEl.innerHTML = '🔧 Testing offline mode...';
            
            const api = new APIService();
            api.offlineMode = true;
            
            api.request('/test').then(response => {
                statusEl.className = 'status success';
                statusEl.innerHTML = '✅ Offline mode working correctly';
            }).catch(error => {
                statusEl.className = 'status error';
                statusEl.innerHTML = '❌ Offline mode test failed: ' + error.message;
            });
        };
        
        window.loadMainApp = function() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status info';
            statusEl.innerHTML = '🚀 Loading main application...';
            
            setTimeout(() => {
                window.location.href = '/index.html';
            }, 500);
        };
        
        // Auto-test on load
        setTimeout(() => {
            testOfflineMode();
        }, 1000);
    </script>
</body>
</html>
